# .github/workflows/map.yml
name: Update Map Every 12 Hours

on:
  workflow_dispatch: # Allow manual trigger
  schedule:
    # At minute 0 past every 12th hour
    # https://crontab.guru/#0_*/12_*_*_*
    - cron: '0 */12 * * *'

jobs:
  build-and-commit:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      # The generate step rewrites the full output set, so clear out the
      # previous run's files first: datasets or years that disappear
      # upstream would otherwise linger as stale JSON/PNG on the site.
      - name: Remove previous outputs
        run: rm -f coverage*.json coverage_texture*.png

      # geotessera 0.9+ renders every known dataset (version, variant)
      # as a separate coloured layer with --by-source, emitting per-dataset
      # coverage_<id>.json, coverage_<id>_<year>.json and
      # coverage_texture_<id>.png files plus a top-level coverage.json
      # index and the globe.html viewer. --refresh re-resolves the git ref
      # so new commits to main are picked up despite the uv cache.
      - name: Generate map
        run: uvx --refresh --from git+https://github.com/avsm/geotessera@main geotessera coverage --by-source

      - name: Make HTML
        run: mv globe.html index.html && mv tessera_coverage.png map.png

      - name: Commit and push if it changed
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: 'CI: Auto-update map'
          commit_user_name: 'GitHub Actions Bot'
          commit_user_email: 'actions@github.com'
          commit_author: 'GitHub Actions Bot <actions@github.com>'
